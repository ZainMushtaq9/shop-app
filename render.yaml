databases:
  - name: super-business-db
    databaseName: super_business
    user: admin

services:
  - type: web
    name: super-business-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn backend.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: super-business-db
          property: connectionString

  - type: web
    name: super-business-flutter-web
    env: static
    buildCommand: "flutter build web --release"
    staticPublishPath: "./build/web"
    envVars:
      - key: FLUTTER_VERSION
        value: 3.16.0
