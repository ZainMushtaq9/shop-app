databases:
  - name: super-business-db
    databaseName: super_business
    user: admin
    plan: free

services:
  # 1. Python Backend / API
  - type: web
    name: super-business-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: super-business-db
          property: connectionString

  # 2. Flutter Web Frontend
  - type: web
    name: super-business-shop
    env: static
    buildCommand: ./render-build.sh
    staticPublishPath: build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
