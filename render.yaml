databases:
  - name: super-business-db
    databaseName: super_business
    user: admin
    plan: free

services:
  # 1. Python Backend / API
  - type: web
    name: super-business-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: super-business-db
          property: connectionString

  # 2. Flutter Web Frontend
  - type: web
    name: super-business-shop
    env: static
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    staticPublishPath: build/web
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
