services:
  - type: web
    name: super-business-shop
    env: static
    staticPublishPath: build/web
    headers:
      # Cache Flutter engine and assets (1 year)
      - path: /flutter.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /flutter_bootstrap.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /main.dart.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /canvaskit/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Never cache index.html
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # Service worker never cached
      - path: /flutter_service_worker.js
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
