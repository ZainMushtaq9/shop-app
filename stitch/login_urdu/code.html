<!DOCTYPE html>

<html dir="rtl" lang="ur"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+Arabic:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#006c75",
              "background-light": "#f5f8f8",
              "background-dark": "#0f2223",
            },
            fontFamily: {
              "display": ["Inter", "Noto Sans Arabic", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Background Gradient -->
<div class="fixed inset-0 bg-gradient-to-br from-primary/20 via-background-light to-primary/10 dark:from-primary/30 dark:via-background-dark dark:to-background-dark -z-10"></div>
<!-- Top Navigation (Back Button) -->
<div class="flex items-center p-4 justify-between">
<button class="text-primary flex size-12 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">خوش آمدید</h2>
</div>
<!-- Hero Section / Logo -->
<div class="@container px-4 py-6">
<div class="flex flex-col items-center justify-center gap-6">
<div class="w-32 h-32 bg-primary rounded-3xl flex items-center justify-center shadow-xl shadow-primary/20" data-alt="Modern geometric teal business logo icon">
<span class="material-symbols-outlined text-white text-6xl">storefront</span>
</div>
<div class="text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold leading-tight pb-1">سپر بزنس شاپ</h1>
<h2 class="text-primary text-xl font-medium leading-tight">Super Business Shop</h2>
</div>
</div>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6 px-6 py-8 max-w-md mx-auto w-full">
<!-- Email Field -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-base font-medium pb-2 pr-1">ای میل</p>
<div class="relative flex items-center">
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-primary">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 pr-12 pl-4 text-base font-normal transition-all" placeholder="اپنا ای میل درج کریں" type="email"/>
</div>
</label>
<!-- Password Field -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-base font-medium pb-2 pr-1">پاس ورڈ</p>
<div class="relative flex items-center">
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-primary">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 pr-12 pl-12 text-base font-normal transition-all" placeholder="اپنا پاس ورڈ درج کریں" type="password"/>
<div class="absolute inset-y-0 left-0 flex items-center pl-4 cursor-pointer text-slate-400">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
<!-- Forgot Password -->
<div class="flex justify-start">
<a class="text-primary text-sm font-semibold hover:underline" href="#">پاس ورڈ بھول گئے؟</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all active:scale-[0.98] text-lg">
                لاگ ان کریں
            </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
<span class="text-slate-500 text-sm">یا اس کے ساتھ جاری رکھیں</span>
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="text-slate-700 dark:text-slate-200 font-medium">گوگل</span>
<span class="material-symbols-outlined text-red-500">google</span>
</button>
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="text-slate-700 dark:text-slate-200 font-medium">فیس بک</span>
<span class="material-symbols-outlined text-blue-600">social_leaderboard</span>
</button>
</div>
</div>
<!-- Footer Footer -->
<div class="mt-auto pb-10 px-6 text-center">
<p class="text-slate-600 dark:text-slate-400">
                اکاؤنٹ نہیں ہے؟ 
                <a class="text-primary font-bold hover:underline" href="#">نیا اکاؤنٹ بنائیں</a>
</p>
</div>
</div>
</body></html>
