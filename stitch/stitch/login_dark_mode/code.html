<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Super Business Shop - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006a75",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2123",
                        "card-dark": "#1a2a3a",
                        "navy-deep": "#0d1b2a"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-navy-deep dark:bg-navy-deep group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-navy-deep p-4 pb-2 justify-between">
<div class="text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Super Business Shop</h2>
</div>
<div class="flex flex-col items-center justify-center flex-1 px-4 py-8">
<!-- Shop Logo / Illustration -->
<div class="@container w-full max-w-[480px]">
<div class="px-4 py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/20 rounded-xl min-h-[180px]" data-alt="Modern retail shop interior with blue neon lights" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAZyFrACGmqMYe1VTzV45KPvsc-2x_2DfFMPqv8vJ1QDkxNr3zkq87dY5gfJH0oMiDRlNwLILeOX-3qG6oVJMaGjeMi0me5GB90dzC3T88FIk1OXKIH584GcKwzZe4yRxXV4XG98nLGPxHOCUcLUXZUtmRKvzfbwAyZvCUZz_nasnER5VApKExX5xvG78ryeIONZx5x6FGF4TkGcwpj-Gd6uuHZH62FT2X4fA5kT1MpJs6Xvq-1y9DAYofFgnqba-gP-cnFa3kUbIpv");'>
</div>
</div>
</div>
<!-- Headers -->
<div class="w-full max-w-[480px]">
<h1 class="text-slate-100 tracking-tight text-[32px] font-bold leading-tight px-4 text-center pb-2 pt-6">Welcome Back | خوش آمدید</h1>
<p class="text-slate-400 text-base font-normal leading-normal pb-6 pt-1 px-4 text-center">Sign in to your account | اپنے اکاؤنٹ میں سائن ان کریں</p>
</div>
<!-- Login Form Card -->
<div class="w-full max-w-[480px] bg-card-dark rounded-xl p-6 shadow-2xl border border-primary/10">
<div class="flex flex-col gap-4">
<!-- Email Field -->
<label class="flex flex-col">
<div class="flex justify-between items-center pb-2">
<span class="text-slate-100 text-sm font-medium">Email | ای میل</span>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
<input class="form-input flex w-full rounded-lg text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-700 bg-navy-deep h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal" placeholder="yourname@business.com" value=""/>
</div>
</label>
<!-- Password Field -->
<label class="flex flex-col">
<div class="flex justify-between items-center pb-2">
<span class="text-slate-100 text-sm font-medium">Password | پاس ورڈ</span>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<input class="form-input flex w-full rounded-lg text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-700 bg-navy-deep h-14 placeholder:text-slate-500 pl-12 pr-12 text-base font-normal" placeholder="••••••••" type="password" value=""/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] cursor-pointer">visibility</span>
</div>
</label>
<!-- OTP Section Placeholder -->
<div class="pt-2">
<p class="text-slate-400 text-xs font-normal text-center mb-4">You will receive a 4-digit OTP for verification | تصدیق کے لیے آپ کو 4 ہندسوں کا کوڈ موصول ہوگا۔</p>
<div class="flex justify-center gap-3">
<input class="w-12 h-12 text-center text-xl font-bold bg-navy-deep border border-slate-700 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-transparent outline-none" maxlength="1"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-navy-deep border border-slate-700 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-transparent outline-none" maxlength="1"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-navy-deep border border-slate-700 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-transparent outline-none" maxlength="1"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-navy-deep border border-slate-700 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-transparent outline-none" maxlength="1"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg mt-4 flex items-center justify-center gap-2 transition-colors">
<span>Continue | جاری رکھیں</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full bg-transparent border border-primary/30 text-primary hover:bg-primary/5 font-medium py-3 rounded-lg text-sm">
                        Forgot Password? | پاس ورڈ بھول گئے؟
                    </button>
</div>
</div>
<!-- Footer Links -->
<div class="w-full max-w-[480px] mt-8 text-center">
<p class="text-slate-500 text-sm">
                    Don't have an account? | کیا اکاؤنٹ نہیں ہے؟
                    <a class="text-primary font-bold ml-1" href="#">Register | رجسٹر کریں</a>
</p>
</div>
</div>
<div class="h-8 bg-navy-deep"></div>
</div>
</body></html>
