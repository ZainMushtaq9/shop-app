<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006c75",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2223",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Super Business Shop - Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top App Bar / Brand Header -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-center shadow-sm">
<h2 class="text-primary text-xl font-bold leading-tight tracking-tight">Super Business Shop</h2>
</div>
<div class="flex-1 flex flex-col items-center">
<!-- Logo Section with Teal Gradient Background -->
<div class="w-full @container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-gradient-to-br from-primary to-[#004d54] flex flex-col items-center justify-center overflow-hidden @[480px]:rounded-xl min-h-[280px] shadow-inner" data-alt="Abstract teal and dark cyan gradient pattern">
<div class="bg-white/10 p-6 rounded-full backdrop-blur-sm border border-white/20">
<span class="material-symbols-outlined text-white text-7xl">storefront</span>
</div>
<h1 class="text-white mt-4 text-2xl font-bold">Welcome Back</h1>
<p class="text-white/80 text-sm">Empowering your business journey</p>
</div>
</div>
</div>
<!-- Bilingual Tabs -->
<div class="w-full max-w-[480px] mt-4">
<div class="flex border-b border-primary/20 px-4 justify-between">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-primary pb-[13px] pt-4 flex-1" href="#">
<p class="text-sm font-bold leading-normal tracking-wide">Login</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-[13px] pt-4 flex-1" href="#">
<p class="text-sm font-bold leading-normal tracking-wide" dir="rtl">لاگ ان</p>
</a>
</div>
</div>
<!-- Login Form -->
<div class="w-full max-w-[480px] space-y-2 p-4">
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-base font-medium leading-normal pb-2">Email Address</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:ring-2 focus:ring-primary focus:border-primary h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="Enter your email" type="email"/>
</label>
</div>
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-base font-medium leading-normal pb-2">Password</p>
<div class="flex w-full flex-1 items-stretch rounded-lg shadow-sm">
<input class="form-input flex w-full min-w-0 flex-1 rounded-l-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:ring-0 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] border-r-0 text-base" placeholder="Enter your password" type="password"/>
<div class="text-primary/60 flex border border-primary/20 bg-white dark:bg-background-dark/50 items-center justify-center pr-[15px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex justify-between items-center py-2 px-1">
<label class="inline-flex items-center cursor-pointer">
<input class="form-checkbox rounded text-primary border-primary/20 focus:ring-primary" type="checkbox"/>
<span class="ml-2 text-sm text-slate-600 dark:text-slate-400">Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<div class="pt-6 pb-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center mt-6 text-slate-500 dark:text-slate-400 text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Register Now</a>
</p>
</div>
</div>
</div>
<!-- Footer / Language Selector -->
<div class="w-full p-4 flex justify-center items-center gap-6 border-t border-primary/10 mt-auto bg-white dark:bg-background-dark/30">
<button class="text-xs font-medium text-primary">English</button>
<div class="w-[1px] h-3 bg-primary/20"></div>
<button class="text-xs font-medium text-slate-500">اردو</button>
<div class="w-[1px] h-3 bg-primary/20"></div>
<button class="text-xs font-medium text-slate-500">Arabic</button>
</div>
</div>
</body></html>
