<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ur"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Nastaliq+Urdu:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006a75",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0d1b2a",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Nastaliq Urdu", "serif"],
                        "urdu": ["Noto Nastaliq Urdu", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', 'Noto Nastaliq Urdu', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            transform: scaleX(-1); /* Mirroring icons for RTL */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="flex-1 flex flex-col items-center justify-center px-6 py-12 max-w-md mx-auto w-full">
<div class="mb-8 flex flex-col items-center">
<div class="w-20 h-20 bg-primary/20 rounded-xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-5xl">storefront</span>
</div>
<h1 class="text-3xl font-bold dark:text-slate-100 font-urdu mb-2">سپر بزنس شاپ</h1>
<p class="text-slate-500 dark:text-slate-400 font-urdu text-sm">اپنے اکاؤنٹ میں لاگ ان کریں</p>
</div>
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="block text-sm font-medium dark:text-slate-300 font-urdu text-right" for="email">ای میل ایڈریس</label>
<div class="relative">
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="block w-full pr-10 pl-3 py-3 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-primary focus:border-primary text-right font-display dark:text-white" id="email" name="email" placeholder="email@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium dark:text-slate-300 font-urdu" for="password">پاس ورڈ</label>
<a class="text-xs text-primary hover:underline font-urdu" href="#">پاس ورڈ بھول گئے؟</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">lock</span>
</div>
<input class="block w-full pr-10 pl-3 py-3 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-primary focus:border-primary text-right font-display dark:text-white" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-700 rounded bg-slate-800" id="remember-me" name="remember-me" type="checkbox"/>
<label class="mr-2 block text-sm dark:text-slate-300 font-urdu" for="remember-me">مجھے یاد رکھیں</label>
</div>
<button class="w-full py-3 px-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-colors font-urdu text-lg" type="submit">
                لاگ ان کریں
            </button>
</form>
<div class="mt-8 text-center">
<p class="text-slate-400 font-urdu text-sm">
                اکاؤنٹ نہیں ہے؟ 
                <a class="text-primary font-bold hover:underline mr-1" href="#">نیا اکاؤنٹ بنائیں</a>
</p>
</div>
<div class="mt-12 w-full">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-background-dark text-slate-500 font-urdu">یا اس کے ساتھ جاری رکھیں</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-700 bg-slate-800/50 py-2.5 px-4 text-sm font-medium text-slate-100 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">account_circle</span>
<span class="font-urdu">گوگل</span>
</button>
<button class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-700 bg-slate-800/50 py-2.5 px-4 text-sm font-medium text-slate-100 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">phone_iphone</span>
<span class="font-urdu">ایپل</span>
</button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="mt-auto border-t border-slate-800 bg-slate-900/80 backdrop-blur-md px-4 pb-6 pt-3">
<div class="flex justify-around items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-urdu">ہوم</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="text-[10px] font-urdu">شاپ</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="text-[10px] font-urdu">پروفائل</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-urdu">ترتیبات</span>
</a>
</div>
</div>
</body></html>
